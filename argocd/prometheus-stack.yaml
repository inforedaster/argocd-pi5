apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 56.21.3
      helm:
        valueFiles:
          - $values/grafana/values.yaml
    - repoURL: https://github.com/inforedaster/argocd-pi5.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # Grafana rotates its own admin secret on restart; ignore data drift.
  # Grafana deployment annotations are mutated in-cluster by the Helm chart hooks.
  ignoreDifferences:
    - kind: Secret
      name: prometheus-stack-grafana
      namespace: monitoring
      jsonPointers:
        - /data
    - kind: Deployment
      name: prometheus-stack-grafana
      namespace: monitoring
      jsonPointers:
        - /spec/template/metadata/annotations
        - /spec/template/spec/containers/0/env

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
