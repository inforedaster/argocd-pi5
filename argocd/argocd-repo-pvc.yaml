apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-repo-server
    spec:
      volumes:
      - name: argocd-repo-cache
        hostPath:
          path: /mnt/data/argocd-repo-cache
          type: DirectoryOrCreate
      containers:
      - name: argocd-repo-server
        image: quay.io/argoproj/argocd:v2.10.4 # Remplace par ta version si besoin
        volumeMounts:
        - name: argocd-repo-cache
          mountPath: /tmp
