apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: repo-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-repo-server
    spec:
      containers:
      - name: argocd-repo-server
        image: quay.io/argoproj/argocd:v3.3.6
        command: ["/usr/local/bin/argocd-repo-server"]
        args: ["--redis", "argocd-redis:6379"]
        volumeMounts:
        - name: argocd-repo-cache
          mountPath: /tmp
      volumes:
      - name: argocd-repo-cache
        hostPath:
          path: /mnt/data/argocd-repo-cache
          type: DirectoryOrCreate
