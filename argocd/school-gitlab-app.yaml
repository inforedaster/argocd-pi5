apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-gitlab
  namespace: argocd
spec:
  project: schooling
  source:
    repoURL: https://charts.gitlab.io
    chart: gitlab
    # Chart 7.11.x = GitLab 16.11.x.
    # GitLab 17.x ARM64 builds jemalloc with lg_page=16 (64KB) for Apple Silicon
    # compatibility; Pi5 uses 4KB pages → statically linked jemalloc fatally aborts.
    # GitLab 16.11.x was built with lg_page=12 (4KB) and works on Pi5.
    targetRevision: 7.11.6
    helm:
      releaseName: gitlab
      values: |
        global:
          edition: ce
          gitlabVersion: "16.11.6"

          hosts:
            domain: school.local
            https: false
            gitlab:
              name: gitlab.school.local
            registry:
              name: registry.school.local

          ingress:
            enabled: true
            class: traefik
            annotations:
              kubernetes.io/ingress.class: traefik
            configureCertmanager: false
            tls:
              enabled: false

          # No global nodeSelector — components spread across pi-node-02/03.
          # Only gitaly is pinned below (its local-path PVC is on pi-node-03).

          psql:
            host: gitlab-postgres-rw.gitlab.svc.cluster.local
            port: 5432
            database: gitlabhq_production
            username: app
            password:
              secret: gitlab-postgres-app
              key: password

          redis:
            host: school-redis-master.shared.svc.cluster.local
            port: 6379
            auth:
              enabled: true
              secret: school-redis-credentials
              key: redis-password

          minio:
            enabled: false

          appConfig:
            object_store:
              enabled: true
              proxy_download: true
              connection:
                secret: gitlab-minio-connection
                key: connection
            artifacts:
              bucket: gitlab-artifacts
            lfs:
              bucket: gitlab-lfs
            uploads:
              bucket: gitlab-uploads
            packages:
              bucket: gitlab-packages
            backups:
              bucket: gitlab-backups
              tmpBucket: gitlab-backups-tmp

          initialRootPassword:
            secret: gitlab-initial-root-password
            key: password

        # ── Disable bundled infrastructure ────────────────────────────
        postgresql:
          install: false

        redis:
          install: false

        nginx-ingress:
          enabled: false

        certmanager:
          install: false

        certmanager-issuer:
          email: admin@school.local

        prometheus:
          install: false

        spamcheck:
          enabled: false

        praefect:
          enabled: false

        # ── GitLab sub-components ─────────────────────────────────────
        upgradeCheck:
          enabled: false

        gitlab:
          kas:
            enabled: false

          pages:
            enabled: false

          # Crashes on Pi5 ARM64 with jemalloc Unsupported system page size.
          # Non-essential metrics exporter — safe to disable.
          gitlab-exporter:
            enabled: false

          webservice:
            replicaCount: 1
            puma:
              workers: 2
              threads:
                min: 2
                max: 4
            resources:
              requests:
                cpu: 200m
                memory: 900Mi
              limits:
                cpu: 1500m
                memory: 2Gi

          sidekiq:
            replicaCount: 1
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 700m
                memory: 1Gi

          gitaly:
            # PVC is on pi-node-03 (local-path) — must stay on that node.
            nodeSelector:
              kubernetes.io/hostname: pi-node-03
            persistence:
              enabled: true
              storageClass: local-path
              size: 50Gi
            resources:
              requests:
                cpu: 100m
                memory: 200Mi
              limits:
                cpu: 500m
                memory: 512Mi

          gitlab-shell:
            replicaCount: 1
            resources:
              requests:
                cpu: 10m
                memory: 24Mi
              limits:
                cpu: 100m
                memory: 128Mi

          migrations:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi

          toolbox:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

        # ── Container Registry ────────────────────────────────────────
        registry:
          enabled: true
          storage:
            secret: gitlab-registry-storage
            key: config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab

  # HPAs report missing metrics (no metrics-server on Pi5 cluster).
  # StatefulSets gain k8s-defaulted fields on first apply (terminationMessage*,
  # imagePullPolicy, volumeClaimTemplates are immutable after creation).
  # ConfigMaps mutate on GitLab restart; runner token rotates in-cluster.
  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
    - group: apps
      kind: StatefulSet
      namespace: gitlab
      jsonPointers:
        - /spec/template/spec/containers/0/terminationMessagePath
        - /spec/template/spec/containers/0/terminationMessagePolicy
        - /spec/template/spec/containers/0/imagePullPolicy
        - /spec/volumeClaimTemplates
    - kind: ConfigMap
      namespace: gitlab
      jsonPointers:
        - /data
    - kind: Secret
      namespace: gitlab
      jsonPointers:
        - /data/runner-registration-token

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
