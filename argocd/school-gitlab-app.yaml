apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-gitlab
  namespace: argocd
spec:
  project: schooling
  source:
    repoURL: https://github.com/inforedaster/argocd-pi5.git
    targetRevision: HEAD
    path: infrastructure/gitlab-omnibus
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab

  # Omnibus Deployment: StatefulSet-style node affinity and PVC are handled
  # by the deployment.yaml nodeSelector; no Helm-chart drift to ignore.
  # HPAs removed (no metrics-server on Pi5).

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
