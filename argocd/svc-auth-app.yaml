apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: svc-auth-dev
  namespace: argocd
spec:
  project: schooling
  source:
    repoURL: https://gitlab.com/schoooling/school-platform.git
    targetRevision: main
    path: services/svc-auth/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: school-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
