apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: svc-auth-dev
  namespace: argocd
spec:
  project: schooling
  source:
    repoURL: https://gitlab.com/schoooling/school-platform.git
    targetRevision: main
    path: services/svc-auth/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: school-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # Token expires: update ArgoCD secret repo-3494315017 in argocd namespace
    # kubectl patch secret repo-3494315017 -n argocd --type='json' \
    #   -p='[{"op":"replace","path":"/data/password","value":"'$(echo -n "NEW_TOKEN" | base64)'"}]'
    retry:
      limit: 10
      backoff:
        duration: 60s
        factor: 2
        maxDuration: 10m
