apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-infrastructure
  namespace: argocd
spec:
  project: schooling
  source:
    repoURL: https://github.com/inforedaster/argocd-pi5.git
    targetRevision: HEAD
    path: infrastructure
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: shared
  # Redis StatefulSet gains defaulted fields (terminationMessage*, imagePullPolicy)
  # when applied without server-side apply context; volumeClaimTemplates are immutable.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: school-redis
      namespace: shared
      jsonPointers:
        - /spec/template/spec/containers/0/terminationMessagePath
        - /spec/template/spec/containers/0/terminationMessagePolicy
        - /spec/template/spec/containers/0/imagePullPolicy
        - /spec/volumeClaimTemplates

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
