# ==========================================
# CONFIGURATION PROMETHEUS-STACK (PI 5)
# Fichier : grafana/values.yaml
# NOTE: pi-node-04 est NotReady — composants pinnés sur pi-node-02
# ==========================================

fullnameOverride: prometheus-stack

# ── Prometheus ────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "20GB"

    nodeSelector:
      kubernetes.io/hostname: pi-node-02

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi    # Existing PVC — cannot increase without manual resize

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

# ── Grafana ───────────────────────────────────────────────────────────────
grafana:
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  nodeSelector:
    kubernetes.io/hostname: pi-node-02

  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - grafana.school.local

  grafana.ini:
    server:
      root_url: http://grafana.school.local
    auth.anonymous:
      enabled: false

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Pre-configure Loki datasource for when loki-stack is deployed
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-stack:3100
      access: proxy
      isDefault: false

# ── Alertmanager ──────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: pi-node-02

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
    receivers:
      - name: 'null'

# ── Prometheus Operator ───────────────────────────────────────────────────
prometheusOperator:
  nodeSelector:
    kubernetes.io/hostname: pi-node-02
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Node Exporter ─────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 100Mi

# ── Kube State Metrics ────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
