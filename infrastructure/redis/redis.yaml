apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: school-redis
  namespace: shared
spec:
  serviceName: school-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: school-redis
  template:
    metadata:
      labels:
        app: school-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --save
            - "60 1"
            - --loglevel
            - notice
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-redis-credentials
                  key: redis-password
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: school-redis-master
  namespace: shared
  labels:
    app: school-redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: school-redis
---
apiVersion: v1
kind: Service
metadata:
  name: school-redis-headless
  namespace: shared
  labels:
    app: school-redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: school-redis
