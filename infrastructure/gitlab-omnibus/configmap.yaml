apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-omnibus-config
  namespace: gitlab
data:
  # Evaluated as Ruby by gitlab-ctl reconfigure; ENV[] reads container env vars.
  config: |
    external_url 'http://gitlab.school.local'
    nginx['listen_port'] = 80
    nginx['listen_https'] = false

    gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']

    # ── External PostgreSQL (CNPG) ─────────────────────────────────────
    postgresql['enable'] = false
    gitlab_rails['db_adapter']  = 'postgresql'
    gitlab_rails['db_encoding'] = 'utf8'
    gitlab_rails['db_host']     = 'gitlab-postgres-rw.gitlab.svc.cluster.local'
    gitlab_rails['db_port']     = 5432
    gitlab_rails['db_database'] = 'gitlabhq_production'
    gitlab_rails['db_username'] = 'app'
    gitlab_rails['db_password'] = ENV['DB_PASSWORD']

    # ── External Redis (shared namespace) ─────────────────────────────
    redis['enable'] = false
    gitlab_rails['redis_host']     = 'school-redis-master.shared.svc.cluster.local'
    gitlab_rails['redis_port']     = 6379
    gitlab_rails['redis_password'] = ENV['REDIS_PASSWORD']

    # ── Git data directory ─────────────────────────────────────────────
    git_data_dirs({ "default" => { "path" => "/var/opt/gitlab/git-data" } })

    # ── Object storage (MinIO) ─────────────────────────────────────────
    gitlab_rails['object_store']['enabled']          = true
    gitlab_rails['object_store']['proxy_download']   = true
    gitlab_rails['object_store']['connection'] = {
      'provider'              => 'AWS',
      'region'                => 'us-east-1',
      'aws_access_key_id'     => 'school-admin',
      'aws_secret_access_key' => 'School@2027!MO',
      'aws_signature_version' => 4,
      'host'                  => 'school-minio.shared.svc.cluster.local',
      'endpoint'              => 'http://school-minio.shared.svc.cluster.local:9000',
      'path_style'            => true
    }
    gitlab_rails['object_store']['objects']['artifacts']['bucket']          = 'gitlab-artifacts'
    gitlab_rails['object_store']['objects']['lfs']['bucket']                = 'gitlab-lfs'
    gitlab_rails['object_store']['objects']['uploads']['bucket']            = 'gitlab-uploads'
    gitlab_rails['object_store']['objects']['packages']['bucket']           = 'gitlab-packages'
    gitlab_rails['object_store']['objects']['dependency_proxy']['bucket']   = 'gitlab-dependency-proxy'
    gitlab_rails['object_store']['objects']['terraform_state']['bucket']    = 'gitlab-terraform-state'
    gitlab_rails['object_store']['objects']['ci_secure_files']['bucket']    = 'gitlab-ci-secure-files'

    # ── Container Registry ─────────────────────────────────────────────
    registry_external_url 'http://registry.school.local'
    registry_nginx['listen_port']  = 5000
    registry_nginx['listen_https'] = false
    gitlab_rails['registry_enabled'] = true
    gitlab_rails['registry_host']    = 'registry.school.local'
    gitlab_rails['registry_port']    = 80
    registry['storage'] = {
      's3' => {
        'accesskey'      => 'school-admin',
        'secretkey'      => 'School@2027!MO',
        'bucket'         => 'gitlab-registry',
        'region'         => 'us-east-1',
        'regionendpoint' => 'http://school-minio.shared.svc.cluster.local:9000',
        'pathstyle'      => true,
        'v4auth'         => true
      }
    }

    # ── Puma (reduced for Pi5) ─────────────────────────────────────────
    puma['worker_processes'] = 2
    puma['min_threads']      = 2
    puma['max_threads']      = 4

    # ── Sidekiq ───────────────────────────────────────────────────────
    sidekiq['concurrency'] = 10

    # ── Disabled features ─────────────────────────────────────────────
    gitlab_kas['enable']   = false
    gitlab_pages['enable'] = false

    # ── Disable bundled monitoring stack ──────────────────────────────
    prometheus['enable']          = false
    alertmanager['enable']        = false
    node_exporter['enable']       = false
    redis_exporter['enable']      = false
    postgres_exporter['enable']   = false
    pgbouncer_exporter['enable']  = false
    grafana['enable']             = false
