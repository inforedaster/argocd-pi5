apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-minio
  namespace: argocd
spec:
  project: schooling
  source:
    repoURL: https://charts.min.io
    chart: minio
    targetRevision: 5.2.0
    helm:
      releaseName: school-minio
      values: |
        mode: standalone

        existingSecret: school-minio-credentials

        persistence:
          enabled: true
          storageClass: local-path
          size: 10Gi

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        service:
          type: ClusterIP

        consoleService:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: shared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
