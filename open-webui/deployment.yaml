# 1. Le Stockage pour la base de données d'Open WebUI
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
# 2. Le Déploiement de l'application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: default
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi" # Limite de sécurité pour le Pi 5
        env:
        # Lien vers Ollama dans son nouveau namespace
        - name: OLLAMA_BASE_URL
          value: "http://ollama-service.ollama.svc.cluster.local:11434"
        # Désactive l'authentification si tu es seul (Optionnel)
        - name: WEBUI_AUTH
          value: "true" 
        volumeMounts:
        - name: webui-data
          mountPath: /app/backend/data
      volumes:
      - name: webui-data
        persistentVolumeClaim:
          claimName: open-webui-pvc
---
# 3. Le Service pour accéder à l'interface
apiVersion: v1
kind: Service
metadata:
  name: open-webui-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: open-webui
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080 # Le port que tu utilises déjà
