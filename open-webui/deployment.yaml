apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui # On garde le nom du déploiement
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080 # Le port interne classique d'Open-WebUI
        resources:
          limits:
            memory: "1Gi"
          requests:
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui-service # EXACTEMENT le nom de ton service actuel
  namespace: default
spec:
  type: NodePort
  selector:
    app: open-webui
  ports:
    - port: 80          # Le port exposé par le service
      targetPort: 8080  # Le port vers le pod
      nodePort: 30080   # TON PORT ACTUEL
