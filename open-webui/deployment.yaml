# 1. Création du Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: webui
---
# 2. Le Stockage (Nouveau PVC dans le namespace webui)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-pvc
  namespace: webui
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
# 3. Le Déploiement
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:v0.8.12
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
        env:
        - name: OLLAMA_BASE_URL
          value: "http://ollama-service.ollama.svc.cluster.local:11434"
        volumeMounts:
        - name: webui-data
          mountPath: /app/backend/data
      volumes:
      - name: webui-data
        persistentVolumeClaim:
          claimName: open-webui-pvc
---
# 4. Le Service
apiVersion: v1
kind: Service
metadata:
  name: open-webui-service
  namespace: webui
spec:
  type: NodePort
  selector:
    app: open-webui
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
