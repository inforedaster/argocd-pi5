apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-ce
  namespace: gitlab
  labels:
    app: gitlab-ce
spec:
  replicas: 1
  # Recreate avoids split-brain: kill old pod fully before starting new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab-ce
  template:
    metadata:
      labels:
        app: gitlab-ce
    spec:
      # Co-locate with the local-path PVC (bound to pi-node-03).
      nodeSelector:
        kubernetes.io/hostname: pi-node-03

      # gitlab-ctl reconfigure writes to /etc/gitlab and /var/log/gitlab.
      # Only /var/opt/gitlab (data + git repos) needs persistence.
      volumes:
        - name: gitlab-data
          persistentVolumeClaim:
            claimName: gitlab-omnibus-data
        - name: gitlab-config
          emptyDir: {}
        - name: gitlab-logs
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi

      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:16.11.6-ce.0
          imagePullPolicy: IfNotPresent

          env:
            - name: GITLAB_OMNIBUS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: gitlab-omnibus-config
                  key: config
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-postgres-app
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: school-redis-credentials
                  key: redis-password
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitlab-initial-root-password
                  key: password

          ports:
            - name: http
              containerPort: 80
            - name: ssh
              containerPort: 22
            - name: registry
              containerPort: 5000

          volumeMounts:
            - name: gitlab-data
              mountPath: /var/opt/gitlab
            - name: gitlab-config
              mountPath: /etc/gitlab
            - name: gitlab-logs
              mountPath: /var/log/gitlab
            - name: shm
              mountPath: /dev/shm

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 3000m
              memory: 5Gi

          # Omnibus needs 3-5 min to run gitlab-ctl reconfigure on first boot.
          startupProbe:
            httpGet:
              path: /-/health
              port: 80
            failureThreshold: 60
            periodSeconds: 10
            # 10min window for first-boot DB migrations
          livenessProbe:
            httpGet:
              path: /-/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /-/readiness
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
