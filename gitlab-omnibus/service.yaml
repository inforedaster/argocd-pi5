apiVersion: v1
kind: Service
metadata:
  name: gitlab-ce
  namespace: gitlab
  labels:
    app: gitlab-ce
spec:
  selector:
    app: gitlab-ce
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: registry
      port: 5000
      targetPort: 5000
---
# SSH exposed as NodePort so git clone over SSH works from the LAN.
apiVersion: v1
kind: Service
metadata:
  name: gitlab-ce-ssh
  namespace: gitlab
  labels:
    app: gitlab-ce
spec:
  type: NodePort
  selector:
    app: gitlab-ce
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30022
