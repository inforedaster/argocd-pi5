# Exemple de SealedSecret - NE PAS appliquer tel quel.
# Générer avec : kubeseal --controller-name=sealed-secrets-controller \
#                         --controller-namespace=kube-system \
#                         --format yaml < secret.yaml > sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: example-secret
  namespace: default
spec:
  encryptedData:
    MY_SECRET_KEY: <valeur-chiffrée-par-kubeseal>
  template:
    metadata:
      name: example-secret
      namespace: default
    type: Opaque
